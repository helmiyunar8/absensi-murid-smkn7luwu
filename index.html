<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Kehadiran Siswa - SMKN 7 LUWU</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }
</style>
</head>

<body class="bg-slate-100">

<div class="min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-lg rounded-2xl shadow-xl p-6">

<h1 class="text-xl font-bold text-center mb-4">
Aplikasi Kehadiran Siswa<br>
<span class="text-blue-600">SMKN 7 LUWU</span>
</h1>

<form id="attendance-form" class="space-y-4">

<select name="nama" required class="w-full border p-3 rounded">
<option value="">-- Pilih Nama --</option>
<option>ADILA ADELIYA</option>
<option>ASTRID NIRMALA</option>
<option>DANIL</option>
<option>Jelita Putri Liani</option>
<option>NESAR HERMAN</option>
<option>Nureni</option>
<option>NURPADILLA</option>
<option>PUSVITA</option>
<option>SERUNI</option>
<option>SRI INDAH</option>
<option>SUCI LESTARI</option>
<option>YUKA SYAPUTRA</option>
<option>AFRIANI</option>
<option>DAPIL BURHANUDDIN</option>
<option>FANIA ABUSTAM</option>
<option>NUR'SUCI ELZA FERIZKAH</option>
<option>NUR AINUN</option>
<option>RAEHAN</option>
<option>SERI NOVITA ASSARAH</option>
<option>SYAKILA NUR AINI</option>
</select>

<input type="text" name="kelas" placeholder="Contoh: X TKJ" required class="w-full border p-3 rounded">

<input type="date" name="tanggal" required class="w-full border p-3 rounded">

<div class="grid grid-cols-2 gap-2">
<label><input type="radio" name="kehadiran" value="Hadir" required> Hadir</label>
<label><input type="radio" name="kehadiran" value="Izin"> Izin</label>
<label><input type="radio" name="kehadiran" value="Sakit"> Sakit</label>
<label><input type="radio" name="kehadiran" value="Alpa"> Alpa</label>
</div>

<textarea name="catatan" placeholder="Catatan (Opsional)" class="w-full border p-3 rounded"></textarea>

<button type="submit" class="w-full bg-blue-600 text-white p-3 rounded font-bold">
Kirim ke Guru
</button>

</form>

<p id="status" class="text-center mt-4 font-semibold"></p>

</div>
</div>

<script>
const today = new Date().toLocaleDateString();

const lastSubmit = localStorage.getItem("lastSubmit");

if(lastSubmit === today){
document.getElementById("attendance-form").innerHTML =
"<h2 style='text-align:center;color:red;font-weight:bold'>Anda sudah absen hari ini ✅</h2>";
}
document.getElementById("attendance-form").addEventListener("submit", async function(e){
e.preventDefault();

const formData = new FormData(this);

const data = {
nama: formData.get("nama"),
kelas: formData.get("kelas"),
tanggal: formData.get("tanggal"),
kehadiran: formData.get("kehadiran"),
catatan: formData.get("catatan") || "-"
};

document.getElementById("status").innerText = "Mengirim...";

await fetch("https://script.google.com/macros/s/AKfycbz6oZKRFVOZdPtjS74i31aTmO0zvzVIuuv_OmPQ9be24RtN4vjg3B8dkwBgt-5ruVoAzg/exec", {
method: "POST",
mode: "no-cors",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(data)
});

document.getElementById("status").innerText = "✅ Berhasil dikirim!";
  localStorage.setItem("lastSubmit", today);
this.reset();

});

</script>

</body>
</html>
